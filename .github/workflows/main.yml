name: Main CI Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    paths-ignore:
      - "**/README.md"
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  code-checks-library:
    name: Code Checks for Library
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        action:
          - command: build
            args: --release
          - command: fmt
            args: --all -- --check
          - command: clippy
            args: --all-features --workspace -- -D warnings
          - command: doc
            args: --all-features
          - command: publish
            args: --dry-run
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
        with:
          components: rust-src, rustfmt, clippy
      - name: Enable caching
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ steps.rust-toolchain.outputs.cachekey }}
      - name: Run command 'cargo ${{ matrix.action.command }}'' in directory '${{ matrix.working-directory }}'
        run: cargo ${{ matrix.action.command }} ${{ matrix.action.args }}

  code-checks-examples:
    name: Code Checks for Examples
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        working-directory: ["examples/raspberrypi", "examples/linux"]
        action:
          - command: fmt
            args: --all -- --check
          - command: clippy
            args: --all-features --workspace -- -D warnings
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
        with:
          components: rust-src, rustfmt, clippy
          targets: |
            x86_64-unknown-linux-gnu
            aarch64-unknown-linux-gnu
      - name: Enable caching
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ steps.rust-toolchain.outputs.cachekey }}
      - name: Run command 'cargo ${{ matrix.action.command }}'' in directory '${{ matrix.working-directory }}'
        run: cargo ${{ matrix.action.command }} ${{ matrix.action.args }}
        working-directory: ${{ matrix.working-directory }}

  build-check-examples:
    needs: [code-checks-examples]
    name: Examples Build Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [
          {working_directory: "examples/raspberrypi", target: "aarch64-unknown-linux-gnu"},
          {working_directory: "examples/linux", target: "x86_64-unknown-linux-gnu"},
        ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.example.target }}
          args: "--locked --release --verbose"
          strip: true
          working-directory: ${{ matrix.example.working_directory }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [code-checks-library, code-checks-examples, build-check-examples]
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Cargo login
        run: |-
          echo "${{ secrets.CRATES_IO_API_TOKEN }}" | cargo login
      - name: Cargo Publish
        run: |-
          cargo publish --verbose
      - name: Create GitHub release
        uses: docker://antonyurchenko/git-release:v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
